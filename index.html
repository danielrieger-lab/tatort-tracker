<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tatort Tracker" />
    <title>Tatort Tracker</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Tatort Tracker</h1>
      </header>

      <section class="card" aria-labelledby="list-title">
        <div class="list-head">
          <h2 id="list-title">Episodenübersicht</h2>
          <p id="catalog-count" class="hint">Tatort-Katalog wird geladen …</p>
        </div>

        <div class="search-wrap">
          <label class="search-label" for="episode-search">Suche</label>
          <input
            id="episode-search"
            type="search"
            list="episode-suggestions"
            placeholder="Folgennummer, Titel, Jahr, Ermittler, Ort"
            autocomplete="off"
          />
          <datalist id="episode-suggestions"></datalist>
        </div>

        <ul id="episode-list" aria-live="polite"></ul>
      </section>
    </main>

    <footer class="bottom-bar" aria-label="Navigation">
      <div class="bottom-bar-inner">
        <a class="bottom-btn active" href="index.html" aria-current="page">
          <img src="assets/icons/episode.svg" alt="" aria-hidden="true" />
          <span>Episoden</span>
        </a>
        <a class="bottom-btn" href="statistik.html">
          <img src="assets/icons/statistik.svg" alt="" aria-hidden="true" />
          <span>Statistik</span>
        </a>
      </div>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
